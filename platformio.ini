; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
description = una descripcion
default_envs = esp32dev
include_dir = include
libdeps_dir = dependencias

[env:esp32dev]
platform_packages = toolchain-riscv32-esp @ 8.4.0+2021r2-patch5
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
;@~3.0.0 asegura versión 3.0.x
;lib_deps = C:\Users\Admin\Documents\Arduino\libraries\modbus-esp8266-master
  ;andresarmento/modbus-arduino@~1.2.0
;lib_deps = fbiego/ESP32Time@^2.0.4

build_flags = 
    -Wall
    -Wextra
    -Wunused-variable
    -Wunused-function